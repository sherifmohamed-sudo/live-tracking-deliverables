<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign In — Solutions Delivery Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --space-black: #0a0e1a;
    --space-deep: #050811;
    --space-mid: #131826;
    --space-elev: #1c2235;
    --safety-blue: #1b4dff;
    --safety-blue-soft: #6e8bff;
    --code-green: #00d67a;
    --white: #ffffff;
    --grey-100: #e8eaf0;
    --grey-300: #a7adbe;
    --grey-500: #5d6478;
    --grey-700: #2f3548;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --glow-blue: 0 0 28px rgba(27,77,255,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--space-deep);
    color: var(--white);
    font-family: 'Open Sans', sans-serif;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at 15% 0%, rgba(27,77,255,0.18) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 100%, rgba(0,214,122,0.08) 0%, transparent 45%),
      var(--space-deep);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 0 24px;
  }

  .login-card {
    background: linear-gradient(180deg, rgba(28,34,53,0.92) 0%, rgba(19,24,38,0.96) 100%);
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    padding: 48px 40px 44px;
    backdrop-filter: blur(24px);
    box-shadow:
      0 0 60px rgba(27,77,255,0.08),
      0 24px 80px rgba(0,0,0,0.5);
  }

  .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .login-logo-text {
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 1px;
  }
  .login-logo-text span {
    color: var(--safety-blue-soft);
  }

  .login-title {
    font-family: 'Prompt', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--grey-300);
    text-align: center;
    margin-bottom: 8px;
  }

  .login-heading {
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 26px;
    text-align: center;
    color: var(--white);
    margin-bottom: 8px;
  }
  .login-heading strong {
    color: var(--safety-blue-soft);
  }

  .login-subtitle {
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    color: var(--grey-500);
    text-align: center;
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-strong);
  }
  .divider span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--grey-500);
    text-transform: uppercase;
  }

  .google-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px 24px;
    background: var(--space-elev);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    color: var(--white);
    font-family: 'Prompt', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
  }
  .google-btn:hover {
    background: var(--grey-700);
    border-color: var(--safety-blue-soft);
    box-shadow: var(--glow-blue);
    transform: translateY(-1px);
  }
  .google-btn:active {
    transform: translateY(0);
  }
  .google-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .login-footer {
    margin-top: 28px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey-500);
    letter-spacing: 1px;
  }

  .error-msg {
    display: none;
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(255,61,90,0.1);
    border: 1px solid rgba(255,61,90,0.25);
    border-radius: 10px;
    color: #ff6b7f;
    font-size: 13px;
    text-align: center;
    line-height: 1.4;
  }
  .error-msg.visible { display: block; }

  .spinner {
    display: none;
    margin: 16px auto 0;
    width: 28px;
    height: 28px;
    border: 3px solid var(--grey-700);
    border-top-color: var(--safety-blue-soft);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 32px; }
    .login-heading { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">Applied<span>AI</span></div>
    </div>

    <p class="login-title">Solutions Delivery</p>
    <h1 class="login-heading">Command <strong>Centre</strong></h1>
    <p class="login-subtitle">Sign in with your @appliedai.com Google account to access the dashboard.</p>

    <div class="divider"><span>continue with</span></div>

    <button class="google-btn" id="google-signin-btn" onclick="handleGoogleSignIn()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div class="spinner" id="spinner"></div>
    <div class="error-msg" id="error-msg"></div>

    <p class="login-footer">APPLIEDAI &bull; SECURED ACCESS &bull; GOOGLE SSO</p>
  </div>
</div>

<script>
// ---- CONFIG ----
// Replace with your Google OAuth Client ID from https://console.cloud.google.com/
const GOOGLE_CLIENT_ID = '112869379762-nv11nr726mu4lfgqp2kr4ig5krghjac5.apps.googleusercontent.com';

// Optional: restrict to specific domain(s). Set to null to allow any Google account.
const ALLOWED_DOMAINS = ['appliedai.com'];

// If already authenticated, go straight to dashboard
if (sessionStorage.getItem('cc_user')) {
  window.location.replace('index.html');
}

// ---- Google Identity Services ----
let tokenClient = null;

window.addEventListener('load', () => {
  if (typeof google === 'undefined') return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'email profile',
    hosted_domain: 'appliedai.com',
    callback: handleTokenResponse,
  });
});

function handleGoogleSignIn() {
  hideError();

  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
    showError('Google Client ID not configured. Update login.html with your OAuth Client ID.');
    return;
  }

  if (!tokenClient) {
    showError('Google Sign-In library failed to load. Check your connection.');
    return;
  }

  tokenClient.requestAccessToken();
}

async function handleTokenResponse(tokenResponse) {
  showSpinner(true);
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${tokenResponse.access_token}` },
    });
    const payload = await res.json();
    processUser(payload);
  } catch (e) {
    showSpinner(false);
    showError('Failed to fetch user info. Please try again.');
  }
}

function processUser(payload) {
  const email = payload.email;
  const domain = email.split('@')[1];

  if (ALLOWED_DOMAINS && !ALLOWED_DOMAINS.includes(domain)) {
    showSpinner(false);
    showError(`Access restricted. ${domain} is not an authorised domain.`);
    return;
  }

  const user = {
    name: payload.name,
    email: payload.email,
    picture: payload.picture,
    domain: domain,
    loginAt: new Date().toISOString(),
  };

  sessionStorage.setItem('cc_user', JSON.stringify(user));
  window.location.replace('index.html');
}

function showSpinner(v) { document.getElementById('spinner').classList.toggle('visible', v); }
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError() { document.getElementById('error-msg').classList.remove('visible'); }
</script>
</body>
</html>
